syntax = "proto3";
package cds;

import "google/protobuf/empty.proto";

option go_package = "github.com/amadeusitgroup/cds/cdspb";



service Agent {
  // GetVersion returns the version of the API server.
  rpc GetVersion (google.protobuf.Empty) returns (Version) {}
}

// The agent server version.
message Version {
  string current = 1;
}
