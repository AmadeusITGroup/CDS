syntax = "proto3";

package api.v1.artifact;
option go_package = "github.com/amadeusitgroup/cds/cdspb";


// ArtifactDescriptor is the metedata of a transfered artifact
message ArtifactDescriptor {
  // type identifies the type of the data transfered
  // examples : "text/plain", "application/json" 
  string type = 1;

  // content identifier to avoid duplication or verify integrity
  string digest = 2;

  // size is the file size.
  int64 size = 3;

  // identifier identifies which deploy input binding this artifact satisfies.
  // It is derived from CDS resource analysis, for example
  // "resource/user_config/my-bashrc" or "resource/dockerfile/Dockerfile".
  string identifier = 4;
}